<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="platební.css">
</head>

<body>
    <div class="checking">
        <span class="checking-text">Košík</span>
        <span class="checking-text">Doprava</span>
        <span class="checking-text">Platba</span>
    </div>
    <div class="checkout-container">
        <div class="personal-information">
            <div class="personal-information-info">
                <h2>Osobní údaje</h2>
                <div class="personal-information-info-text">
                    <p>Jméno</p>
                    <input type="text">
                    <p>Příjmení</p>
                    <input type="text">
                    <p>E-mail</p>
                    <input type="text">
                    <p>Telefon</p>
                    <input type="text">
                    <p>Fakturační adresa</p>
                    <input type=" text">
                    <p>Město</p>
                    <input type="text">
                    <p>PSČ</p>
                    <input type="text">
                    <p>Číslo karty</p>
                    <input type="text">
                    <p>Datum expirace</p>
                    <input type="text">
                    <p>CVC</p>
                    <input type="text">
                </div>
            </div>
        </div>
        <div class="order-summary">
            <h2>Shrnutí objednávky</h2>

            <div class="summary-content">
                <p class="empty-cart-msg">Váš košík je prázdný.</p>

                <div class="summary-row">
                    <span>Mezisoučet</span>
                    <span class="price">0 Kč</span>
                </div>

                <div class="summary-row">
                    <span>Doprava (PPL)</span>
                    <span class="price">Zdarma</span>
                </div>

                <div class="summary-row total">
                    <span>Celkem</span>
                    <span class="price">0 Kč</span>
                </div>

                <button class="pay-button">
                    Zaplatit bezpečně
                </button>
            </div>
        </div>
    </div>

</body>

</html>
