<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Košík - Electrowave</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="kosik.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/webp" href="Images/logo.webp">
</head>

<body>
    <!-- Hlavička / Menu -->
    <div class="header-container">
        <header class="header">
            <span class="header-text"><a href="index.html" style="color:inherit; text-decoration:none;">&larr; Zpět do
                    obchodu</a></span>
        </header>

        <a href="index.html">
            <img class="logo" src="Images/Logo.webp" alt="Logo">
        </a>
    </div>

    <!-- Samotný košík -->
    <div class="cart-page-container">
        <h1>Váš nákupní košík</h1>

        <div id="cart-items" class="cart-items-wrapper">
            <!-- Položky košíku se vygenerují sem přes index.js -->
        </div>

        <div class="cart-summary">
            <h3>Celkem k platbě</h3>
            <div class="cart-total">
                <span id="total-price">0</span> Kč
            </div>
            <a href="platební.html"><button class="checkout-btn">Přejít k pokladně</button></a>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
